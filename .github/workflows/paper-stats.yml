name: Paper Statistics

on: push

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Count markdown files
        run: |
          count=$(find . -name "*.md" ! -name "README.md" | wc -l)
          date=$(date +%Y-%m-%d)
          echo "COUNT=$count" >> $GITHUB_ENV
          echo "DATE=$date" >> $GITHUB_ENV

      - name: Append history
        run: |
          mkdir -p stats
          
          if [ ! -f stats/history.csv ]; then
            echo "date,count" > stats/history.csv
          fi
          
          grep -v "^$DATE," stats/history.csv > stats/tmp.csv
          
          echo "$DATE,$COUNT" >> stats/tmp.csv
          
          (head -n 1 stats/tmp.csv && tail -n +2 stats/tmp.csv | sort -t, -k1,1) > stats/history.csv

      - name: Generate SVG graph
        run: |
          python << 'EOF'
          import csv
          from pathlib import Path

          data = []
          with open("stats/history.csv") as f:
            reader = csv.DictReader(f)
            for r in reader:
              data.append((r["date"], int(r["count"])))
            data.sort(key=lambda x: x[0])

          if len(data) < 2:
            exit()

          w, h = 600, 200
          padding = 30
          # 만약 논문 수가 0개일 때 0으로 나누는 에러(ZeroDivisionError)를 방지하기 위해 max(1, ...) 처리
          max_y = max(1, max(v for _, v in data)) 

          def sx(i): return padding + i*(w-2*padding)/(len(data)-1)
          def sy(v): return h-padding - v*(h-2*padding)/max_y

          # 일직선 대신 계단(Step) 모양으로 포인트를 연결하는 부분
          step_points = []
          for i, (_, v) in enumerate(data):
              x = sx(i)
              y = sy(v)
              if i > 0:
                  # 이전 점의 Y좌표를 유지한 채 X좌표만 이동 (수평선 긋기)
                  prev_y = sy(data[i-1][1])
                  step_points.append(f"{x},{prev_y}")
              
              # 그 다음 현재 값의 Y좌표로 이동 (수직선 긋기)
              step_points.append(f"{x},{y}")

          points = " ".join(step_points)

          svg = f"""<svg width="{w}" height="{h}" xmlns="http://www.w3.org/2000/svg">
          <polyline fill="none" stroke="#1f6feb" stroke-width="2" points="{points}"/>
          <text x="10" y="15" font-size="12">Cumulative papers</text>
          </svg>"""

          Path("stats/cumulative.svg").write_text(svg)
          EOF

      - name: Commit stats
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stats/history.csv
          git add stats/cumulative.svg 2>/dev/null || true
          git commit -m "Update paper statistics" || echo "No changes"
          git push
